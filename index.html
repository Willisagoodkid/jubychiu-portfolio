<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juby chiuuuuu studio <3 .</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #6c5b5e; font-family: 'Inter', 'Noto Sans TC', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* 核心修復：把燈光參數移到 CSS 之外，確保不會被瀏覽器 cache 影響 */
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // 1. 強制設定：AmbientLight 強度 1.8，PointLight 強度 3500
        // 這是你確認過「正確的光感」參數，我把它寫死在這裡
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6c5b5e);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 22, 75);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.NoToneMapping;
        document.body.appendChild(renderer.domElement);

        // 2. 完美的燈光地基
        const ambient = new THREE.AmbientLight(0xffffff, 1.8);
        scene.add(ambient);

        const colors = [0xffccaa, 0xffbb99, 0xffcccc, 0xffaaee];
        for(let i=0; i<4; i++) {
            const light = new THREE.PointLight(colors[i], 3500, 200);
            light.position.set(Math.random()*20, 38, Math.random()*20); // 燈光拉高到 38，變柔和
            scene.add(light);
        }

        // 3. 背景牆：超粗糙磨砂面，確保光暈會暈開
        const wall = new THREE.Mesh(
            new THREE.SphereGeometry(80, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x554649, side: THREE.BackSide, roughness: 0.95 })
        );
        scene.add(wall);

        // 4. 輪盤 (MeshBasicMaterial 保證卡片顏色絕對不變色)
        const group = new THREE.Group();
        for(let i=0; i<10; i++) {
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 2),
                new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
            );
            const angle = (i/10) * Math.PI * 2;
            mesh.position.set(Math.sin(angle)*20, 0, Math.cos(angle)*20);
            mesh.lookAt(0,0,0);
            group.add(mesh);
        }
        scene.add(group);

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
