<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juby chiuuuuu studio <3 .</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #6c5b5e; font-family: 'Inter', sans-serif; touch-action: none; }
        canvas { display: block; }
        #loader { position: absolute; top:0; left:0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: white; z-index: 999; }
        #ui-layer { position: absolute; bottom: 15%; left: 8%; pointer-events: none; color: #ffffff; z-index: 5; }
        #ui-title { font-size: 5.5rem; font-weight: 900; margin: 0; }
        #ui-subtitle { font-size: 1.2rem; border-left: 4px solid #ffffff; padding-left: 12px; }
    </style>
</head>
<body>
    <div id="loader">LOADING...</div>
    <div id="ui-layer">
        <h1 id="ui-title"></h1>
        <div id="ui-subtitle"></div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        let scene, camera, renderer, carousel, centerModelGroup, cardMeshes = [], projects = [];
        let targetRotation = 0, currentRotation = 0;

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#6c5b5e');
            scene.fog = new THREE.Fog('#6c5b5e', 40, 150);

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(aspect < 1 ? 55 : 35, aspect, 0.1, 500);
            camera.position.set(0, 22, aspect < 1 ? 95 : 75);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 🔥【關鍵還原】：不使用任何色調映射，還原原本的色彩飽和度
            renderer.toneMapping = THREE.NoToneMapping; 
            document.body.appendChild(renderer.domElement);

            const pmrem = new THREE.PMREMGenerator(renderer);
            const envMap = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

            // ✨ 還原第一版溫柔的光感：AmbientLight + 點光源
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            [0xffccaa, 0xffbb99, 0xffcccc, 0xffaaee].forEach(c => {
                const l = new THREE.PointLight(c, 2500, 200);
                l.decay = 1.8;
                scene.add(l);
            });

            // 背景球殼
            scene.add(new THREE.Mesh(new THREE.SphereGeometry(80, 32, 32), new THREE.MeshStandardMaterial({
                color: 0x5a4a4d, side: THREE.BackSide, roughness: 1.0
            })));

            carousel = new THREE.Group(); scene.add(carousel);
            centerModelGroup = new THREE.Group(); scene.add(centerModelGroup);

            // 輪盤
            const tex = new THREE.TextureLoader();
            for(let i=0; i<20; i++) {
                const m = new THREE.Mesh(new THREE.PlaneGeometry(3.6, 2.4), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.8, side: THREE.DoubleSide }));
                tex.load(`images/${['a','b','c','d'][i%4]}.png`, t => m.material.map = t);
                const a = (i/20) * Math.PI * 2;
                m.position.set(Math.sin(a)*20, 0, Math.cos(a)*20);
                m.lookAt(0,0,0);
                carousel.add(m); cardMeshes.push(m);
            }

            // 模型
            const loader = new GLTFLoader();
            for(let n of ['a','b','c','d']) {
                loader.load(`models/${n}.glb`, gltf => {
                    const m = gltf.scene;
                    m.visible = (n === 'a');
                    centerModelGroup.add(m);
                });
            }

            document.getElementById('loader').remove();
            
            // 基礎拖曳
            window.addEventListener('mousemove', e => { if(e.buttons) targetRotation += e.movementX * 0.005; });
            window.addEventListener('touchmove', e => { targetRotation += e.touches[0].clientX * 0.0001; });

            function animate() {
                requestAnimationFrame(animate);
                currentRotation += (targetRotation - currentRotation) * 0.1;
                carousel.rotation.y = currentRotation;
                renderer.render(scene, camera);
            }
            animate();
        }
        init();
    </script>
</body>
</html>
