<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Juby chiuuuuu studio <3 .</title>

    

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">



    <style>

        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #6c5b5e; font-family: 'Inter', 'Noto Sans TC', sans-serif; touch-action: none; }

        canvas { display: block; }

        

        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #6c5b5e; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }

        #loader-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; }

        #progress-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }

        #progress-fill { width: 0%; height: 100%; background: #ffffff; transition: width 0.2s; }



        #brand { position: absolute; top: 30px; left: 40px; color: #ffffff; font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; z-index: 10; cursor: pointer; transition: opacity 0.3s; }

        #brand:hover { opacity: 0.7; }



        #audio-toggle {

            position: absolute; top: 25px; right: 40px; width: 45px; height: 45px;

            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%;

            display: flex; justify-content: center; align-items: center; color: #ffffff; cursor: pointer; z-index: 20; transition: all 0.3s ease;

        }

        #audio-toggle svg { width: 22px; height: 22px; fill: currentColor; }



        #ui-layer {

            position: absolute; bottom: 15%; left: 8%; width: 600px; text-align: left; pointer-events: none; color: #ffffff; z-index: 5;

            transition: opacity 0.6s, transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);

        }

        body.panel-open #ui-layer { transform: translateY(-200px); opacity: 0; }

        #ui-title { font-size: 5.5rem; font-weight: 900; margin: 0; line-height: 0.85; text-transform: uppercase; }

        #ui-subtitle { font-size: 1.2rem; font-weight: 700; margin: 0; padding-left: 12px; border-left: 4px solid #ffffff; line-height: 1.2; }



        #glass-panel {

            position: absolute; bottom: 0; left: 0; width: 100%; height: 85vh; 

            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);

            border-top: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px 30px 0 0; 

            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); 

            z-index: 100; display: flex; flex-direction: column; align-items: center; cursor: pointer;

        }

        #glass-panel.full-open { transform: translateY(0%); background: rgba(255, 255, 255, 0.15); cursor: default; }



        .panel-handle { width: 60px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 5px; margin-top: 15px; margin-bottom: 30px; flex-shrink: 0; }



        .panel-content {

            width: 100%; max-width: 100%; padding: 0 40px; box-sizing: border-box;

            display: flex; flex-direction: column; gap: 50px; opacity: 0; transition: opacity 0.8s; height: 100%; overflow-y: auto;

        }

        #glass-panel.full-open .panel-content { opacity: 1; }



        .panel-left { width: 100%; padding-top: 20px; }

        .panel-title-text { font-size: 3.5rem; font-weight: 900; color: #ffffff; line-height: 1.1; word-break: break-word; }



        .panel-right { width: 100%; padding-bottom: 100px; }

        .panel-right::-webkit-scrollbar { width: 4px; }

        .panel-right::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 4px; }



        .detail-text { width: 100%; }

        .detail-text img { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 25px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .detail-text h2 { font-size: 2rem; font-weight: 900; margin: 0 0 15px 0; color: #ffffff; }

        .detail-text p { font-size: 1.1rem; line-height: 1.8; color: #eeeeee; margin-bottom: 25px; }



        #close-btn { position: absolute; top: 20px; right: 25px; width: 30px; height: 30px; color: white; font-size: 24px; display: none; z-index: 110; cursor: pointer; }

        body.panel-open #close-btn { display: block; }



        @media (max-width: 768px) {

            #brand { top: 25px; left: 25px; font-size: 1rem; }

            #audio-toggle { top: 20px; right: 25px; width: 40px; height: 40px; }

            #audio-toggle svg { width: 18px; height: 18px; }

            #ui-layer { left: 25px; bottom: 12%; }

            #ui-title { font-size: 3.5rem; }

            #ui-subtitle { font-size: 1rem; }

            .panel-title-text { font-size: 2.2rem; }

        }



        @media (min-width: 769px) {

            .panel-content { flex-direction: row; }

            .panel-left { flex: 1; padding-top: 200px; }

            .panel-right { flex: 3; padding-right: 25px; }

        }

    </style>

    

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">

        {

            "imports": {

                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

            }

        }

    </script>

</head>

<body>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>



    <div id="loader">

        <div id="loader-text">LOADING...</div>

        <div id="progress-bar"><div id="progress-fill"></div></div>

    </div>

    

    <div id="brand" onclick="location.reload()">Juby chiuuuuu studio &lt;3 .</div>



    <div id="audio-toggle">

        <svg id="icon-sound-off" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>

        <svg id="icon-sound-on" viewBox="0 0 24 24" style="display:none;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

    </div>



    <div id="ui-layer">

        <h1 id="ui-title"></h1>

        <div id="ui-subtitle"></div>

    </div>



    <div id="glass-panel">

        <div class="panel-handle"></div>

        <div id="close-btn">✕</div>

        <div class="panel-content">

            <div class="panel-left">

                <div class="panel-title-text" id="detail-panel-title"></div>

            </div>

            <div class="panel-right">

                <div class="detail-text" id="detail-desc"></div>

            </div>

        </div>

    </div>



<script type="module">

    import * as THREE from 'three';

    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';



    // ✨ 修正亮點：在最頂部先計算 RWD，防堵代碼發生 ReferenceError 癱瘓

    const aspect = window.innerWidth / window.innerHeight;

    const RADIUS = 20; const CARD_COUNT = 25; const SPACE_COLOR = '#6c5b5e';

    

    let scene, camera, renderer, carouselGroup, centerModelGroup, cardMeshes = [], projects = [];

    let targetRotation = 0, currentRotation = 0, rotationVelocity = 0;

    let currentActiveIndex = -1, activeCardUUID = null, previewIndex = 0;

    

    let isTouching = false, touchStartX = 0, touchStartY = 0, lastTouchX = 0, lastTouchY = 0, touchStartTime = 0;

    const CAMERA_BASE_Y = aspect < 1 ? 26 : 22; 

    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2(), manager = new THREE.LoadingManager();

    let lights = [];



    // ✨ 陀螺儀核心動態變數

    let gyroTargetX = 0, gyroTargetY = 0, gyroCurrentX = 0, gyroCurrentY = 0, gyroEnabled = false;



    init();



    async function init() {

        await fetchData();

        scene = new THREE.Scene(); scene.background = new THREE.Color(SPACE_COLOR); scene.fog = new THREE.Fog(SPACE_COLOR, 40, 140);

        

        // 💡 ✨ 手機版圓圈自然縮小至 0.7 ✨

        // 透過將視角FO從 35度 擴大到 52度，並把鏡頭Z軸拉遠到 105，圓環比例在手機直向上會完美精緻縮小 0.7 倍，且絕不遮字。

        camera = new THREE.PerspectiveCamera(aspect < 1 ? 52 : 35, aspect, 0.1, 300);

        camera.position.set(0, CAMERA_BASE_Y, aspect < 1 ? 105 : 75); 

        camera.lookAt(0, aspect < 1 ? 6 : 0, 0);



        renderer = new THREE.WebGLRenderer({ antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        renderer.shadowMap.enabled = true;

        document.body.appendChild(renderer.domElement);



        const pmremGenerator = new THREE.PMREMGenerator(renderer);

        const studioEnvMap = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;



        setupLightsAndFloor(studioEnvMap);

        createCarousel();

        

        window.centerModelTargetScale = aspect < 1 ? 1.5 : 2.0;



        if (projects.length > 0) { 

            // 💡 100% 復活中間模型：強制等待異步加載完畢，才切換顯示

            await preloadAllModels(studioEnvMap); 

            switchPreviewModel(0); 

        }



        window.addEventListener('resize', onWindowResize);

        window.addEventListener('wheel', (e) => { if(currentActiveIndex === -1) targetRotation += e.deltaY * 0.0008; });

        window.addEventListener('mousemove', onMouseMove);

        

        window.addEventListener('mousedown', () => { isTouching = true; });

        window.addEventListener('mouseup', (e) => { isTouching = false; onClick(e); });

        

        // 觸控與自然發生的陀螺儀權限觸發

        window.addEventListener('touchstart', onTouchStart, { passive: false });

        window.addEventListener('touchmove', onTouchMove, { passive: false });

        window.addEventListener('touchend', onTouchEnd);



        setupUIEvents();

        document.getElementById('loader').style.opacity = 0;

        setTimeout(() => document.getElementById('loader').remove(), 500);

        animate();

    }



    function setupLightsAndFloor(studioEnvMap) {

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        

        // ✨ 💡 光線變糊、變高的黃金物理比例 💡 ✨

        // 降低強度（intensity），改用更溫柔的暗調霓虹色，完美解決過曝死白問題

        const lightColors = [0xffccaa, 0xffbb99, 0xffcccc, 0xffaaee];

        const lightIntensities = aspect < 1 ? [120, 100, 100, 80] : [200, 180, 180, 140];



        for(let i = 0; i < 4; i++) {

            const light = new THREE.PointLight(lightColors[i], lightIntensities[i], 200);

            light.decay = 1.3; 

            lights.push(light); scene.add(light);

        }

        

        // ✨ 提高粗糙度 (roughness: 0.95)，讓地板變成極致磨砂霧面，將光斑完全「揉碎、暈染」開來

        const floorGeo = new THREE.PlaneGeometry(1000, 1000);

        const floorMat = new THREE.MeshStandardMaterial({ 

            color: new THREE.Color('#4a3c3c'), 

            roughness: 0.95, 

            metalness: 0.05,

            envMap: studioEnvMap

        });

        const floor = new THREE.Mesh(floorGeo, floorMat);

        floor.rotation.x = -Math.PI / 2; floor.position.y = aspect < 1 ? -6.0 : -4.0; 

        floor.receiveShadow = true; 

        scene.add(floor);

        

        centerModelGroup = new THREE.Group(); scene.add(centerModelGroup);

    }



    async function fetchData() {

        const items = ['a', 'b', 'c', 'd']; 

        projects = await Promise.all(items.map(async (name, index) => {

            let desc = ""; 

            let customTitle = "COLLECTION " + name.toUpperCase();

            if (name === 'a') customTitle = "JUBY 2014";

            if (name === 'b') customTitle = "JUBY FALL";

            if (name === 'c') customTitle = "JUBY DANCE";

            if (name === 'd') customTitle = "JUBY STUDIO";



            try { 

                const r = await fetch(`txts/${name}.txt?t=${Date.now()}`); 

                if(r.ok) desc = await r.text();

            } catch(e){}

            return { id: index, letter: name.toUpperCase(), title: customTitle, image: `images/${name}.png?t=${Date.now()}`, model: `models/${name}.glb`, desc: desc, sceneObject: null, normalizedScale: 1 };

        }));

    }



    async function preloadAllModels(studioEnvMap) {

        const loader = new GLTFLoader(manager);

        const dracoLoader = new DRACOLoader();

        dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');

        loader.setDRACOLoader(dracoLoader);



        for (const project of projects) {

            await new Promise(res => {

                loader.load(project.model, (gltf) => {

                    const model = gltf.scene;

                    model.traverse(n => {

                        if(n.isMesh) {

                            n.castShadow = true;

                            if(n.material) n.material.envMap = studioEnvMap;

                            n.layers.set(1); 

                        }

                    });



                    // 自動精準標準化模型尺寸，防止爆版

                    const box = new THREE.Box3().setFromObject(model);

                    const size = new THREE.Vector3(); box.getSize(size);

                    project.normalizedScale = 4.0 / Math.max(size.x, size.y, size.z); 

                    

                    model.visible = false; 

                    centerModelGroup.add(model); 

                    project.sceneObject = model; 

                    res();

                }, undefined, () => { res(); });

            });

        }

    }



    function createCarousel() {

        carouselGroup = new THREE.Group(); scene.add(carouselGroup);

        const texLoader = new THREE.TextureLoader();



        for (let i = 0; i < CARD_COUNT; i++) {

            const p = projects[i % projects.length];

            const angle = (i / CARD_COUNT) * Math.PI * 2;

            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3.6, 2.4), new THREE.MeshStandardMaterial({ 

                color: 0xffffff, transparent: true, opacity: 0.7, side: THREE.DoubleSide

            }));

            texLoader.load(p.image, (t) => { mesh.material.map = t; mesh.material.needsUpdate = true; });

            

            mesh.position.set(Math.sin(angle)*RADIUS, aspect < 1 ? -2 : 0, Math.cos(angle)*RADIUS);

            mesh.lookAt(0, aspect < 1 ? 6 : 0, 0); mesh.rotateY(Math.PI / 2);

            mesh.userData = { dataIndex: i % projects.length, originalAngle: angle, targetY: aspect < 1 ? -2 : 0, currentY: aspect < 1 ? -2 : 0 };

            carouselGroup.add(mesh); cardMeshes.push(mesh);

        }

    }



    // ✨ 💡 自然發生的隱形陀螺儀活化函數 💡 ✨

    function triggerNaturalGyro() {

        if (gyroEnabled) return;

        gyroEnabled = true;

        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {

            // iOS 13+ 必須由使用者動作觸發，在此自然通關申請

            DeviceOrientationEvent.requestPermission()

                .then(state => { if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation); })

                .catch(console.error);

        } else {

            window.addEventListener('deviceorientation', handleOrientation);

        }

    }



    function handleOrientation(event) {

        if (currentActiveIndex !== -1) return;

        const beta = event.beta; const gamma = event.gamma;

        if (beta && gamma) {

            // 將手機晃動的角度精準平滑映射到相機微動範圍

            gyroTargetX = (gamma / 30) * 1.5; 

            gyroTargetY = ((beta - 45) / 30) * 1.5; 

        }

    }



    function onTouchStart(e) { 

        triggerNaturalGyro(); // ✨ 使用者手一碰螢幕，立刻隱形活化陀螺儀，完全沒按鈕！

        isTouching = true; 

        touchStartX = e.touches[0].clientX; 

        touchStartY = e.touches[0].clientY;

        lastTouchX = touchStartX; lastTouchY = touchStartY;

        touchStartTime = Date.now(); 

        rotationVelocity = 0; 

    }



    function onTouchMove(e) {

        if (!isTouching || currentActiveIndex !== -1) return;

        const currentX = e.touches[0].clientX; const currentY = e.touches[0].clientY;

        const deltaX = currentX - lastTouchX; const deltaY = currentY - lastTouchY;

        

        // 雙軸連動拖曳

        targetRotation += deltaX * 0.007 + deltaY * 0.004; 

        lastTouchX = currentX; lastTouchY = currentY;

        e.preventDefault();

    }



    function onTouchEnd(e) { 

        isTouching = false; 

        const duration = Date.now() - touchStartTime;

        const totalDist = Math.sqrt(Math.pow(lastTouchX - touchStartX, 2) + Math.pow(lastTouchY - touchStartY, 2));

        if (duration < 250 && totalDist < 15) onClick(e); 

    }



    function onClick(e) {

        // ✨ 點選外圍空白處自動優雅關閉面板

        if (currentActiveIndex !== -1) {

            const path = e.composedPath ? e.composedPath() : [];

            const clickedOnContent = path.some(el => el.classList && el.classList.contains('panel-content'));

            if (!clickedOnContent && e.target.id !== 'audio-toggle') exitDetailMode();

            return;

        }



        const clientX = e.clientX || lastTouchX; const clientY = e.clientY || lastTouchY;

        mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1;

        

        raycaster.setFromCamera(mouse, camera);

        const hits = raycaster.intersectObjects(cardMeshes);

        if (hits.length > 0) {

            const hit = hits[0].object;

            enterDetailMode(hit);

            

            let targetAngle = -hit.userData.originalAngle;

            const currentRot = currentRotation; const twoPi = Math.PI * 2;

            const cycles = Math.floor(currentRot / twoPi);

            targetAngle += cycles * twoPi;

            const diff = targetAngle - currentRot;

            if (diff > Math.PI) targetAngle -= twoPi;

            else if (diff < -Math.PI) targetAngle += twoPi;

            targetRotation = targetAngle;

        }

    }



    function enterDetailMode(mesh) {

        currentActiveIndex = mesh.userData.dataIndex;

        document.getElementById('glass-panel').classList.add('full-open');

        document.body.classList.add('panel-open');

        setTimeout(() => {

            switchPreviewModel(currentActiveIndex);

            const p = projects[currentActiveIndex];

            document.getElementById('detail-panel-title').innerText = p.title;

            document.getElementById('detail-desc').innerHTML = p.desc;

        }, 200); 



        activeCardUUID = mesh.uuid;

        mesh.userData.targetY = aspect < 1 ? 40 : 50; 

    }



    function exitDetailMode() {

        currentActiveIndex = -1;

        document.getElementById('glass-panel').classList.remove('full-open');

        document.body.classList.remove('panel-open');

        if (activeCardUUID) {

            const m = cardMeshes.find(c => c.uuid === activeCardUUID);

            if (m) m.userData.targetY = aspect < 1 ? -2 : 0;

        }

        activeCardUUID = null;

    }



    function switchPreviewModel(idx) {

        const p = projects[idx]; if(!p) return;

        document.getElementById('ui-title').innerText = p.letter;

        document.getElementById('ui-subtitle').innerText = p.title;

        projects.forEach((proj, i) => {

            if (proj.sceneObject) {

                proj.sceneObject.visible = (i === idx);

                if (i === idx) {

                    proj.sceneObject.position.y = aspect < 1 ? 7.5 : 2.5; 

                    window.centerModelTargetScale = (aspect < 1 ? 1.5 : 2.2) * proj.normalizedScale;

                }

            }

        });

    }



    function setupUIEvents() {

        const btn = document.getElementById('audio-toggle'); const audio = document.getElementById('bg-music'); let playing = false;

        btn.addEventListener('click', (e) => { e.stopPropagation(); playing ? audio.pause() : audio.play(); playing = !playing; document.getElementById('icon-sound-on').style.display = playing ? 'block' : 'none'; document.getElementById('icon-sound-off').style.display = playing ? 'none' : 'block'; });

        document.getElementById('close-btn').addEventListener('click', exitDetailMode);

        document.querySelector('.panel-handle').addEventListener('click', exitDetailMode);

    }



    function onMouseMove(e) { if (currentActiveIndex !== -1) return; mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; }

    function onWindowResize() { const aspect = window.innerWidth / window.innerHeight; camera.aspect = aspect; camera.position.z = aspect < 1 ? 105 : 75; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }



    function animate() {

        requestAnimationFrame(animate);

        const time = Date.now() * 0.0002;

        

        if (!isTouching) { rotationVelocity = (targetRotation - currentRotation) * 0.05; currentRotation += rotationVelocity; } 

        else { currentRotation += (targetRotation - currentRotation) * 0.15; }

        if (carouselGroup) carouselGroup.rotation.y = currentRotation;



        // ✨ 💡 燈光大幅拉高：將 Y 軸座標推高至高空，擴散範圍，消除局部死白爆亮 💡 ✨

        lights.forEach((l, i) => {

            const offset = (i * Math.PI) / 2;

            const moodTime = aspect < 1 ? time * 0.6 : time; 

            l.position.set(

                Math.sin(moodTime + offset) * 28, 

                CAMERA_BASE_Y + 16, // ✨ 核心高度拉升：改到相機上方高空向下灑落，光感會極致均勻柔和

                Math.cos(moodTime + offset) * 28

            );

        });



        // 融合滑鼠動態與手機自然陀螺儀

        gyroCurrentX += (gyroTargetX - gyroCurrentX) * 0.05;

        gyroCurrentY += (gyroTargetY - gyroCurrentY) * 0.05;



        const targetCamX = -mouse.x * (aspect < 1 ? 1 : 3) + gyroCurrentX;

        const targetCamY = mouse.y * (aspect < 1 ? 1 : 3) + CAMERA_BASE_Y + gyroCurrentY;

        camera.position.x += (targetCamX - camera.position.x) * 0.05;

        camera.position.y += (targetCamY - camera.position.y) * 0.05;

        camera.lookAt(0, aspect < 1 ? 6 : 0, 0);



        cardMeshes.forEach(m => {

            m.userData.currentY += (m.userData.targetY - m.userData.currentY) * 0.1; m.position.y = m.userData.currentY;

            if (currentActiveIndex === -1) {

                const worldPos = new THREE.Vector3(); m.getWorldPosition(worldPos);

                m.position.y += Math.sin(time + m.userData.originalAngle) * 0.2; // 呼吸起伏



                const distToFront = worldPos.distanceTo(new THREE.Vector3(0, aspect < 1 ? -2 : 0, RADIUS));

                if (distToFront < (aspect < 1 ? 3.5 : 5) && previewIndex !== m.userData.dataIndex) {

                    switchPreviewModel(m.userData.dataIndex); previewIndex = m.userData.dataIndex;

                }

                m.scale.lerp(new THREE.Vector3(distToFront < (aspect < 1 ? 3.5 : 5) ? 1.25 : 1, distToFront < (aspect < 1 ? 3.5 : 5) ? 1.25 : 1, 1), 0.1);

            }

        });



        projects.forEach(p => {

            if (p.sceneObject && p.sceneObject.visible) {

                p.sceneObject.rotation.y += 0.005;

                const currentScale = p.sceneObject.scale.x;

                const newScale = currentScale + (window.centerModelTargetScale - currentScale) * 0.05;

                p.sceneObject.scale.set(newScale, newScale, newScale);

            }

        });



        renderer.render(scene, camera);

    }

</script>
