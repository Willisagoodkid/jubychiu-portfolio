<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juby chiuuuuu studio <3 .</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #6c5b5e; font-family: 'Inter', 'Noto Sans TC', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #2a2022; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        #ui-layer { position: absolute; bottom: 15%; left: 8%; width: 600px; pointer-events: none; color: #ffffff; z-index: 5; transition: opacity 0.6s; }
        #ui-title { font-size: 5.5rem; font-weight: 900; margin: 0; text-transform: uppercase; }
        #ui-subtitle { font-size: 1.2rem; font-weight: 700; padding-left: 12px; border-left: 4px solid #ffffff; }

        #glass-panel { position: absolute; bottom: 0; left: 0; width: 100%; height: 85vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px 30px 0 0; transform: translateY(100%); transition: transform 0.5s; z-index: 100; }
        #glass-panel.full-open { transform: translateY(0%); }
    </style>
    
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loader">LOADING...</div>
    <div id="ui-layer">
        <h1 id="ui-title"></h1>
        <div id="ui-subtitle"></div>
    </div>
    <div id="glass-panel"><div class="panel-handle"></div></div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    let scene, camera, renderer, carouselGroup, centerModelGroup, cardMeshes = [], projects = [];
    let targetRotation = 0, currentRotation = 0;
    let isTouching = false, lastTouchX = 0;

    init();

    async function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color('#2a2022');
        
        // 🔥【關鍵修正】：統一鎖定 FOV 為 35，Z軸為 75，拒絕手機變形，保證比例一致
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 15, 75);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.NoToneMapping;
        document.body.appendChild(renderer.domElement);

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const studioEnvMap = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        setupScene(studioEnvMap);
        createCarousel();
        await preloadModels(studioEnvMap);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 簡單旋轉邏輯
        window.addEventListener('touchstart', (e) => { isTouching = true; lastTouchX = e.touches[0].clientX; });
        window.addEventListener('touchmove', (e) => { if(isTouching) { targetRotation += (e.touches[0].clientX - lastTouchX) * 0.005; lastTouchX = e.touches[0].clientX; } });
        window.addEventListener('touchend', () => isTouching = false);
        window.addEventListener('mousedown', (e) => { isTouching = true; lastTouchX = e.clientX; });
        window.addEventListener('mousemove', (e) => { if(isTouching) targetRotation += (e.clientX - lastTouchX) * 0.005; lastTouchX = e.clientX; });
        window.addEventListener('mouseup', () => isTouching = false);

        document.getElementById('loader').remove();
        animate();
    }

    function setupScene(envMap) {
        // 全局光
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        
        // 點光源群：強光模式，物理強度 10000 確保有感且不散，固定環繞
        const colors = [0xffccaa, 0xffbb99, 0xffcccc, 0xffaaee];
        for(let i=0; i<4; i++) {
            const l = new THREE.PointLight(colors[i], 10000, 100);
            l.decay = 2.0;
            scene.add(l);
        }
        
        // 地板：恢復第一版最完美的緞面材質，捕捉 envMap
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ 
            color: '#332628', roughness: 0.8, metalness: 0.1, envMap: envMap 
        }));
        floor.rotation.x = -Math.PI/2; floor.position.y = -6; floor.receiveShadow = true;
        scene.add(floor);
        
        // 背景球：霧面球殼
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(80, 32, 32), new THREE.MeshStandardMaterial({ 
            color: 0x5a4a4d, side: THREE.BackSide, roughness: 1.0 
        })));

        centerModelGroup = new THREE.Group(); scene.add(centerModelGroup);
    }

    function createCarousel() {
        carouselGroup = new THREE.Group(); scene.add(carouselGroup);
        const tex = new THREE.TextureLoader();
        for(let i=0; i<20; i++) {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(3.6, 2.4), new THREE.MeshBasicMaterial({ side: THREE.DoubleSide, transparent: true, opacity: 0.8 }));
            tex.load(`images/${['a','b','c','d'][i%4]}.png`, t => m.material.map = t);
            const a = (i/20) * Math.PI * 2;
            m.position.set(Math.sin(a)*20, 0, Math.cos(a)*20);
            m.lookAt(0,0,0);
            carouselGroup.add(m);
        }
    }

    async function preloadModels(env) {
        const loader = new GLTFLoader();
        new DRACOLoader().setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/').let = loader.setDRACOLoader(new DRACOLoader());
        
        for(let n of ['a','b','c','d']) {
            loader.load(`models/${n}.glb`, gltf => {
                const m = gltf.scene;
                m.traverse(c => { if(c.isMesh) { c.castShadow=true; c.material.envMap=env; }});
                m.visible = (n === 'a');
                centerModelGroup.add(m);
            });
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        currentRotation += (targetRotation - currentRotation) * 0.1;
        carouselGroup.rotation.y = currentRotation;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
