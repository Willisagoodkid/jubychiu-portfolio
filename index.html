<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juby chiuuuuu studio <3 .</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #6c5b5e; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #6c5b5e; display: flex; justify-content: center; align-items: center; color: white; z-index: 999; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="loader">LOADING...</div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6c5b5e);
        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.PerspectiveCamera(aspect < 1 ? 48 : 35, aspect, 0.1, 500);
        camera.position.set(0, 22, aspect < 1 ? 110 : 75);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.NoToneMapping;
        document.body.appendChild(renderer.domElement);

        // 1. 環境光
        scene.add(new THREE.AmbientLight(0xffffff, 1.8));
        const colors = [0xffccaa, 0xffbb99, 0xffcccc, 0xffaaee];
        const lights = [];
        for(let i=0; i<4; i++) {
            const l = new THREE.PointLight(colors[i], 3000, 200);
            lights.push(l); scene.add(l);
        }

        // 2. 霓虹背景球
        const bg = new THREE.Mesh(new THREE.SphereGeometry(70, 32, 32), new THREE.MeshStandardMaterial({color: 0x554649, side: THREE.BackSide, roughness: 0.95}));
        scene.add(bg);

        // 3. 模型載入 (中心對齊歸零)
        const centerGroup = new THREE.Group();
        scene.add(centerGroup);
        const loader = new GLTFLoader();
        const draco = new DRACOLoader().setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        loader.setDRACOLoader(draco);

        ['a','b','c','d'].forEach(name => {
            loader.load(`models/${name}.glb`, (gltf) => {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const center = new THREE.Vector3(); box.getCenter(center);
                model.position.sub(center); // 關鍵位移歸零
                model.visible = false;
                centerGroup.add(model);
                model.userData.name = name;
            });
        });

        // 4. 輪盤
        const carousel = new THREE.Group();
        scene.add(carousel);
        const tex = new THREE.TextureLoader();
        for(let i=0; i<20; i++) {
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3, 2), new THREE.MeshBasicMaterial({transparent: true, opacity: 0.7, side: THREE.DoubleSide}));
            tex.load(`images/${['a','b','c','d'][i%4]}.png`, t => mesh.material.map = t);
            const angle = (i/20) * Math.PI * 2;
            mesh.position.set(Math.sin(angle)*20, 0, Math.cos(angle)*20);
            mesh.lookAt(0,0,0);
            carousel.add(mesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            carousel.rotation.y += 0.005;
            lights.forEach((l,i) => l.position.set(Math.sin(Date.now()*0.0005+i)*25, 38, Math.cos(Date.now()*0.0005+i)*25));
            renderer.render(scene, camera);
        }
        document.getElementById('loader').style.display = 'none';
        animate();
    </script>
</body>
</html>
