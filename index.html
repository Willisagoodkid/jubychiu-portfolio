<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juby Chiu Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #6c5b5e; font-family: 'Inter', 'Noto Sans TC', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #6c5b5e; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s; }
        #loader-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; }
        #progress-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #ffffff; transition: width 0.2s; }

        /* 左上角標題 */
        #brand {
            position: absolute; top: 25px; left: 25px; color: #ffffff;
            font-size: 1.1rem; font-weight: bold; letter-spacing: 1px;
            z-index: 10; cursor: pointer; transition: opacity 0.3s;
        }

        /* 右上角音樂按鈕 (毛玻璃風格) */
        #audio-toggle {
            position: absolute; top: 20px; right: 25px;
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #ffffff; cursor: pointer; z-index: 20; transition: all 0.3s ease;
        }
        #audio-toggle:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }
        #audio-toggle svg { width: 20px; height: 20px; fill: currentColor; }

        /* 首頁資訊層 */
        #ui-layer {
            position: absolute; bottom: 12%; left: 25px;
            text-align: left; pointer-events: none; color: #ffffff; z-index: 5;
            transition: opacity 0.6s, transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        body.panel-open #ui-layer { transform: translateY(-100px); opacity: 0; }
        #ui-title { font-size: 4rem; font-weight: 900; margin: 0; line-height: 0.85; text-transform: uppercase; }
        #ui-subtitle { font-size: 1rem; font-weight: 700; margin: 8px 0 0 0; padding-left: 10px; border-left: 3px solid #ffffff; }

        /* 手機彈起式底部面板 (Bottom Sheet) */
        #glass-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 85vh; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px 30px 0 0; 
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
            z-index: 100; display: flex; flex-direction: column; align-items: center;
        }
        #glass-panel.full-open { transform: translateY(0%); background: rgba(255, 255, 255, 0.18); }

        .panel-handle { width: 50px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 5px; margin: 15px 0 20px 0; flex-shrink: 0; cursor: pointer; }

        .panel-content {
            width: 100%; padding: 0 25px; box-sizing: border-box;
            display: flex; flex-direction: column;
            gap: 20px; opacity: 0; transition: opacity 0.5s; height: 100%; overflow-y: auto;
        }
        #glass-panel.full-open .panel-content { opacity: 1; }

        .panel-left { width: 100%; padding-top: 10px; }
        .panel-title-text { font-size: 2.2rem; font-weight: 900; color: #ffffff; line-height: 1.1; }

        .panel-right { width: 100%; padding-bottom: 100px; }
        .panel-right::-webkit-scrollbar { width: 4px; }
        .panel-right::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

        .detail-text img { max-width: 100%; height: auto; border-radius: 12px; margin-bottom: 20px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .detail-text h2 { font-size: 1.6rem; font-weight: 900; margin: 0 0 15px 0; color: #ffffff; }
        .detail-text p { font-size: 1rem; line-height: 1.7; color: #eeeeee; margin-bottom: 25px; }

        /* ✕ 關閉按鈕 */
        #close-btn {
            position: absolute; top: 20px; right: 25px; width: 30px; height: 30px;
            color: rgba(255, 255, 255, 0.7); font-size: 24px; display: none; z-index: 110; cursor: pointer;
        }
        body.panel-open #close-btn { display: block; }

        /* ✨ RWD 電腦版排版還原 */
        @media (min-width: 769px) {
            #brand { font-size: 1.2rem; top: 30px; left: 40px; }
            #ui-layer { left: 8%; bottom: 15%; }
            #ui-title { font-size: 5.5rem; }
            #ui-subtitle { font-size: 1.2rem; }
            .panel-content { flex-direction: row; padding: 0 60px; gap: 60px; }
            .panel-left { flex: 1; padding-top: 150px; }
            .panel-right { flex: 2.5; padding-right: 30px; }
            .panel-title-text { font-size: 3.5rem; }
            .detail-text h2 { font-size: 2rem; }
        }
    </style>
    
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div id="loader">
        <div id="loader-text">INITIALIZING...</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    
    <div id="brand" onclick="location.reload()">Juby chiuuuuu studio &lt;3 .</div>

    <div id="audio-toggle">
        <svg id="icon-sound-off" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        <svg id="icon-sound-on" viewBox="0 0 24 24" style="display:none;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </div>

    <div id="ui-layer">
        <h1 id="ui-title"></h1>
        <div id="ui-subtitle"></div>
    </div>

    <div id="glass-panel">
        <div class="panel-handle"></div>
        <div id="close-btn">✕</div>
        <div class="panel-content">
            <div class="panel-left">
                <div class="panel-title-text" id="detail-panel-title"></div>
            </div>
            <div class="panel-right">
                <div class="detail-text" id="detail-desc"></div>
            </div>
        </div>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const RADIUS = 20;
    const CARD_COUNT = 25;
    const SPACE_COLOR = '#6c5b5e';
    
    let scene, camera, renderer, carouselGroup, centerModelGroup, cardMeshes = [], projects = [];
    let targetRotation = 0, currentRotation = 0, rotationVelocity = 0;
    let currentActiveIndex = -1, activeCardUUID = null, previewIndex = 0, centerModelTargetScale = 2.0;
    
    let isTouching = false, touchStartX = 0;
    const CAMERA_BASE_Y = 16; // 💡 微調 Y 軸，不傾斜，讓圓環保持在水平正中心
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2(), manager = new THREE.LoadingManager();
    let lights = [], studioEnvMap;

    init();

    async function init() {
        await fetchData();
        scene = new THREE.Scene(); scene.background = new THREE.Color(SPACE_COLOR); scene.fog = new THREE.Fog(SPACE_COLOR, 40, 150);
        
        const aspect = window.innerWidth / window.innerHeight;
        // 💡 根據手機直向和電腦橫向，動態調整視野大小 (FOV)
        camera = new THREE.PerspectiveCamera(aspect < 1 ? 48 : 35, aspect, 0.1, 500);
        camera.position.set(0, CAMERA_BASE_Y, aspect < 1 ? 82 : 72); 
        camera.lookAt(0, 4, 0); // 💡 微調看向上方，確保模型和圓環不會被下方的文字擋住

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        studioEnvMap = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        setupLights();
        if (projects.length > 0) { await preloadAllModels(); switchPreviewModel(0); }
        createCarousel();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('wheel', (e) => { if (currentActiveIndex === -1) targetRotation += e.deltaY * 0.0008; });
        window.addEventListener('mousemove', onMouseMove);
        
        window.addEventListener('mousedown', (e) => { isTouching = true; });
        window.addEventListener('mouseup', (e) => { isTouching = false; onClick(e); });
        
        window.addEventListener('touchstart', onTouchStart, { passive: false });
        window.addEventListener('touchmove', onTouchMove, { passive: false });
        window.addEventListener('touchend', onTouchEnd);

        setupUIEvents();
        document.getElementById('loader').style.opacity = 0;
        setTimeout(() => document.getElementById('loader').remove(), 500);
        animate();
    }

    async function fetchData() {
        const items = ['a', 'b', 'c', 'd', 'e', 'f']; 
        projects = await Promise.all(items.map(async (name, index) => {
            let desc = ""; let customTitle = name.toUpperCase();
            if (name === 'a') customTitle = "JUBY 2014";
            if (name === 'c') customTitle = "JUBY DANCE";
            
            try { 
                const r = await fetch(`txts/${name}.txt?t=${Date.now()}`); 
                if(r.ok) {
                    desc = await r.text();
                } else {
                    // 💡 防錯機制：如果抓不到 txt，就自動產生乾淨的預設文字，網頁就不會卡死
                    desc = `<h2>COLLECTION ${name.toUpperCase()}</h2><p>Experience the latest creation from Juby Chiu Studio. Exploring texture, form, and futuristic design language.</p><img src="images/${name}.png" alt="preview">`;
                }
            } catch(e){}
            return { id: index, letter: name.toUpperCase(), title: customTitle, image: `images/${name}.png?t=${Date.now()}`, model: `models/${name}.glb`, desc: desc, sceneObject: null, normalizedScale: 1 };
        }));
    }

    function setupLights() {
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const colors = [0xffd54f, 0xc084fc, 0xff8a65, 0xf472b6];
        for(let i = 0; i < 4; i++) {
            const light = new THREE.PointLight(colors[i], 2000, 150);
            lights.push(light); scene.add(light);
        }
        centerModelGroup = new THREE.Group(); scene.add(centerModelGroup);
    }

    async function preloadAllModels() {
        const loader = new GLTFLoader(manager);
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        loader.setDRACOLoader(dracoLoader);
        for (const project of projects) {
            await new Promise(res => {
                loader.load(project.model, (gltf) => {
                    const model = gltf.scene;
                    model.traverse(n => { if(n.isMesh) { n.castShadow = true; n.material.envMap = studioEnvMap; n.layers.set(1); } });
                    const box = new THREE.Box3().setFromObject(model);
                    const size = new THREE.Vector3(); box.getSize(size);
                    project.normalizedScale = 5.0 / Math.max(size.x, size.y, size.z);
                    model.visible = false; centerModelGroup.add(model); project.sceneObject = model;
                    res();
                }, undefined, res);
            });
        }
    }

    function createCarousel() {
        carouselGroup = new THREE.Group(); scene.add(carouselGroup);
        const texLoader = new THREE.TextureLoader();
        for (let i = 0; i < CARD_COUNT; i++) {
            const p = projects[i % projects.length];
            const angle = (i / CARD_COUNT) * Math.PI * 2;
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3.6, 2.4), new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.7, side: THREE.DoubleSide }));
            texLoader.load(p.image, (t) => { mesh.material.map = t; mesh.material.needsUpdate = true; });
            
            // 💡 水平圓環公式還原，取消所有傾斜，讓後半圈乖乖繞回來
            mesh.position.set(Math.sin(angle)*RADIUS, 4, Math.cos(angle)*RADIUS);
            mesh.lookAt(0, 4, 0); mesh.rotateY(Math.PI / 2);
            mesh.userData = { dataIndex: i % projects.length, originalAngle: angle, targetY: 4, currentY: 4 };
            carouselGroup.add(mesh); cardMeshes.push(mesh);
        }
    }

    // ✨ 手機一指滑動與慣性輪盤滾動
    function onTouchStart(e) { isTouching = true; touchStartX = e.touches[0].clientX; rotationVelocity = 0; }
    function onTouchMove(e) {
        if (!isTouching || currentActiveIndex !== -1) return;
        const deltaX = e.touches[0].clientX - touchStartX;
        targetRotation += deltaX * 0.007; // 💡 控制手機滑動的靈敏度
        touchStartX = e.touches[0].clientX;
        e.preventDefault();
    }
    function onTouchEnd(e) { isTouching = false; }

    function onClick(e) {
        const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
        const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
        if(!clientX || !clientY) return;
        
        mouse.x = (clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(cardMeshes);
        if (hits.length > 0) {
            const hit = hits[0].object;
            if (currentActiveIndex === hit.userData.dataIndex) return;
            enterDetailMode(hit);
            
            // 💡 點擊後，把點到的卡片旋轉到最前面 (正前方角度為0)
            let targetAngle = -hit.userData.originalAngle;
            const currentRot = currentRotation;
            const twoPi = Math.PI * 2;
            const cycles = Math.floor(currentRot / twoPi);
            targetAngle += cycles * twoPi;
            const diff = targetAngle - currentRot;
            if (diff > Math.PI) targetAngle -= twoPi;
            else if (diff < -Math.PI) targetAngle += twoPi;
            targetRotation = targetAngle;
        }
    }

    function enterDetailMode(mesh) {
        currentActiveIndex = mesh.userData.dataIndex;
        switchPreviewModel(currentActiveIndex);
        const p = projects[currentActiveIndex];
        document.getElementById('detail-panel-title').innerText = p.title;
        document.getElementById('detail-desc').innerHTML = p.desc;
        
        // ✨ 內容從底部彈上來覆蓋
        document.getElementById('glass-panel').classList.add('full-open');
        document.body.classList.add('panel-open');
        
        activeCardUUID = mesh.uuid;
        mesh.userData.targetY = 45; // ✨ 卡片往上飛效果
    }

    function exitDetailMode() {
        currentActiveIndex = -1;
        document.getElementById('glass-panel').classList.remove('full-open');
        document.body.classList.remove('panel-open');
        if (activeCardUUID) {
            const m = cardMeshes.find(c => c.uuid === activeCardUUID);
            if (m) m.userData.targetY = 4;
        }
        activeCardUUID = null;
    }

    function switchPreviewModel(idx) {
        const p = projects[idx]; if(!p) return;
        document.getElementById('ui-title').innerText = p.letter;
        document.getElementById('ui-subtitle').innerText = p.title;
        projects.forEach((proj, i) => {
            if (proj.sceneObject) {
                proj.sceneObject.visible = (i === idx);
                if (i === idx) {
                    proj.sceneObject.position.y = 4.5;
                    centerModelTargetScale = proj.normalizedScale * (currentActiveIndex===-1 ? 2.4 : 3.0);
                }
            }
        });
    }

    function setupUIEvents() {
        const btn = document.getElementById('audio-toggle');
        const audio = document.getElementById('bg-music');
        let playing = false;
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            playing ? audio.pause() : audio.play();
            playing = !playing;
            document.getElementById('icon-sound-on').style.display = playing ? 'block' : 'none';
            document.getElementById('icon-sound-off').style.display = playing ? 'none' : 'block';
        });
        document.getElementById('close-btn').addEventListener('click', exitDetailMode);
        document.querySelector('.panel-handle').addEventListener('click', exitDetailMode);
    }

    function onMouseMove(e) {
        if (currentActiveIndex !== -1) return;
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    }

    function onWindowResize() {
        const aspect = window.innerWidth / window.innerHeight;
        camera.aspect = aspect; camera.fov = aspect < 1 ? 48 : 35;
        camera.position.z = aspect < 1 ? 82 : 72;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.0002;
        
        // 慣性滑動阻尼感運算
        if (!isTouching) {
            rotationVelocity = (targetRotation - currentRotation) * 0.05;
            currentRotation += rotationVelocity;
        } else {
            currentRotation += (targetRotation - currentRotation) * 0.15;
        }
        if (carouselGroup) carouselGroup.rotation.y = currentRotation;

        lights.forEach((l, i) => {
            const offset = (i * Math.PI) / 2;
            l.position.set(Math.sin(time + offset)*25, 10 + Math.sin(time*1.5)*5, Math.cos(time + offset)*25);
        });

        // 💡 降低微動幅度，防止畫面劇烈傾斜破壞圓環形狀
        const targetCamX = -mouse.x * 2;
        const targetCamY = mouse.y * 2 + CAMERA_BASE_Y;
        camera.position.x += (targetCamX - camera.position.x) * 0.05;
        camera.position.y += (targetCamY - camera.position.y) * 0.05;
        camera.lookAt(0, 4, 0);

        cardMeshes.forEach(m => {
            m.userData.currentY += (m.userData.targetY - m.userData.currentY) * 0.1;
            m.position.y = m.userData.currentY;
            
            // 自動偵測正前方並顯示標題
            if (currentActiveIndex === -1) {
                const worldPos = new THREE.Vector3();
                m.getWorldPosition(worldPos);
                // 💡 計算卡片與相機正前方的距離
                const distToFront = worldPos.distanceTo(new THREE.Vector3(0, 4, RADIUS));
                if (distToFront < 5 && previewIndex !== m.userData.dataIndex) {
                    switchPreviewModel(m.userData.dataIndex);
                    previewIndex = m.userData.dataIndex;
                }
                m.scale.lerp(new THREE.Vector3(distToFront < 5 ? 1.3 : 1, distToFront < 5 ? 1.3 : 1, 1), 0.1);
            }
        });

        projects.forEach(p => {
            if (p.sceneObject && p.sceneObject.visible) {
                p.sceneObject.rotation.y += 0.005;
                const s = p.sceneObject.scale.x + (centerModelTargetScale - p.sceneObject.scale.x) * 0.05;
                p.sceneObject.scale.set(s, s, s);
            }
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
