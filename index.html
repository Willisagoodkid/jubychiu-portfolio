<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juby chiuuuuu studio <3 .</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Inter:wght@900&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            padding: 0;
            width: 100vw;
            height: 100vh; 
            overflow: hidden; 
            background-color: #6c5b5e; 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
        }
        canvas { display: block; }
        
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #6c5b5e; color: #ffffff; display: flex; 
            flex-direction: column;
            justify-content: center; align-items: center; z-index: 999;
            transition: opacity 0.5s; 
        }
        #loader-text { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; }
        #progress-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #ffffff; transition: width 0.2s; }

        #brand {
            position: absolute; top: 30px; left: 40px; color: #ffffff;
            font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;
            z-index: 10;
            cursor: pointer;
            pointer-events: auto; 
            transition: opacity 0.3s;
        }
        #brand:hover { opacity: 0.7; }

        #audio-toggle {
            position: absolute;
            top: 25px;
            right: 40px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        #audio-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        #audio-toggle svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        #ui-layer {
            position: absolute; 
            bottom: 15%; 
            left: 8%;    
            width: 600px; 
            text-align: left;
            pointer-events: none; 
            color: #ffffff; 
            z-index: 5;
            transition: opacity 0.6s, transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        body.panel-open #ui-layer {
            transform: translateY(-200px);
            opacity: 0; 
        }

        #ui-title-container {
            display: flex;
            align-items: flex-end; 
            margin-bottom: 10px;
            padding-bottom: 15px; 
        }

        #ui-title { 
            font-size: 5.5rem; 
            font-weight: 900; 
            margin: 0; 
            line-height: 0.85; 
            text-transform: uppercase; 
            font-family: 'Inter', sans-serif; 
            word-break: break-word; 
        }

        #ui-subtitle {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
            padding-left: 12px;
            border-left: 4px solid #ffffff; 
            line-height: 1.2;
            word-break: break-word;
        }

        #glass-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85vh; 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(3px); 
            -webkit-backdrop-filter: blur(3px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.02); 
            border-radius: 30px 30px 0 0; 
            transform: translateY(100%); 
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); 
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            cursor: pointer; 
        }

        #glass-panel.half-open { transform: translateY(60%); }
        #glass-panel.full-open { 
            transform: translateY(0%);
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            cursor: default; 
        }

        .panel-handle {
            width: 60px;
            height: 5px;
            background: rgba(255,255,255,0.4); 
            border-radius: 5px;
            margin-top: 15px;
            margin-bottom: 30px;
            flex-shrink: 0;
            cursor: pointer; 
        }

        .panel-content {
            width: 100%; 
            max-width: 100%; 
            padding: 0 40px; 
            box-sizing: border-box;
            display: flex;
            gap: 50px;
            opacity: 0;
            transition: opacity 0.8s; 
            height: 100%;
            padding-bottom: 50px;
        }

        #glass-panel.half-open .panel-content,
        #glass-panel.full-open .panel-content { opacity: 1; }

        .panel-left { 
            flex: 1; 
            padding-top: 200px; 
        }
        .panel-title-text { 
            font-size: 3.5rem; 
            font-weight: 900; 
            color: #ffffff; 
            line-height: 1.1; 
            word-break: break-word; 
        }

        .panel-right { 
            flex: 3; 
            overflow-y: auto; 
            padding-right: 25px; 
            padding-bottom: 100px; 
        }

        .panel-right::-webkit-scrollbar { width: 4px; }
        .panel-right::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 4px; }
        .panel-right::-webkit-scrollbar-track { background: transparent; }

        .detail-text { width: 100%; }
        .detail-text img {
            max-width: 100%;
            height: auto;
            border-radius: 8px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            display: block;
        }
        .detail-text h2 {
            font-size: 2rem;
            font-weight: 900;
            margin: 0 0 15px 0;
            color: #ffffff;
        }
        .detail-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #eeeeee;
            margin-bottom: 25px;
        }

    </style>

                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
